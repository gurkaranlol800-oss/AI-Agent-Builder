packages:
  "three": "Required for the 3D neural network orb in the hero section"
  "@types/three": "Type definitions for three.js"
  "framer-motion": "Required for smooth scroll animations, text reveals, and page transitions"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"

